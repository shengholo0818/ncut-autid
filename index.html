"y4_s2": [["機械工程實驗(三)",1,"prof-req"]]
};

var storageKey = "ncut_state_bulletproof_v32_final";
var activeYear = 1;
var maxYearInState = 4;
var appState = {};
var isLocalStorageAvailable = false;

function createEl(tag, className, text, parent) {
var e = document.createElement(tag);
if (className) e.className = className;
if (text !== undefined && text !== null) e.appendChild(document.createTextNode(text));
if (parent) parent.appendChild(e);
return e;
}

function hasItem(arr, val) {
for (var i = 0; i < arr.length; i++) { if (arr[i] === val) return true; }
return false;
}

function findIdx(arr, val) {
for (var i = 0; i < arr.length; i++) { if (arr[i] === val) return i; }
return -1;
}

var passedColors = {
'通過': 'square-passed',
'抵免': 'square-waived',
'重修中': 'square-retake',
'轉學補修': 'square-retake',
'未修': 'square-failed',
'未通過': 'square-failed'
};

function getSquareClass(status) {
return passedColors[status] || 'square-failed';
}

function getSelectedGenEdFields(currentSem, currentIdx) {
var selected = [];
for (var sem in appState) {
if (appState.hasOwnProperty(sem)) {
var arr = appState[sem];
for (var idx = 0; idx < arr.length; idx++) {
var item = arr[idx];
if (item && item.name === "博雅通識課程" && item.field && (sem !== currentSem || idx !== currentIdx)) {
selected.push(item.field);
}
}
}
}
return selected;
}

function copyBackupCode() {
var txtField = document.getElementById('backup-text-field');
if (!txtField || txtField.value === "") { alert("目前尚無進度可供複製！"); return; }
txtField.select(); txtField.setSelectionRange(0, 99999);
try {
document.execCommand('copy');
alert("📋 智慧增量超短代碼已複製到剪貼簿！");
} catch (err) { alert("請手動複製：" + txtField.value); }
}

function importBackupCode() {
var txtField = document.getElementById('backup-text-field');
if (!txtField || txtField.value.trim() === "") { alert("請先貼上進度代碼！"); return; }
try {
var jsonString = decodeURIComponent(atob(txtField.value.trim()));
var parsed = JSON.parse(jsonString);
decompressAndApplyState(parsed);
saveState(); rebuildTabsUI(); renderStructure(); renderAllBlocks(); calculateCredits();
alert("🟢 歷史修課進度已完美復原校正！");
} catch(e) { alert("✕ 代碼結構損毀，請確認是否複製完整。"); }
}

function checkStorageAvailability() {
try {
window.localStorage.setItem('__test__', '1'); window.localStorage.removeItem('__test__');
isLocalStorageAvailable = true;
} catch(e) { isLocalStorageAvailable = false; }
}

var passedOtherEl = 0;

function getYearBaseLabel(yNum) { return (110 + yNum); }

function getSemesterText(y, sKey) {
var base = getYearBaseLabel(y);
if (sKey === 's1') return base + "-1上";
if (sKey === 's2') return base + "-2下";
if (sKey === 's3') return base + "-3暑修一";
if (sKey === 's4') return base + "-4暑修二";

}

function getYearName(yNum) {
var chs = ["零", "第一", "第二", "第三", "第四", "第五", "第六", "第七", "第八", "第九", "第十"];
return yNum < chs.length ? chs[yNum] + "學年" : "第 " + yNum + " 學年";
}

function getTimelineOrderedSemesters() {
var list = [];
for (var y = 1; y <= maxYearInState; y++) {
list.push("y" + y + "_s1"); list.push("y" + y + "_s2");
list.push("y" + y + "_s3"); list.push("y" + y + "_s4");
}
return list;
}

function loadStateSafely() {
var savedObj = null;

function compressState() {
var payload = [];
for (var sem in appState) {
if (appState.hasOwnProperty(sem)) {
var arr = appState[sem];
for (var idx = 0; idx < arr.length; idx++) {
var item = arr[idx];
if (item.isCustom) {
payload.push(['c', sem, item.name, item.cre, item.type, item.score, item.status, item.field, item.linkId]);
} else {
if (item.score !== "" || item.status !== "未修" || item.field !== "" || item.retakeTarget !== "") {
payload.push(['o', sem, idx, item.score, item.status, item.field, item.retakeTarget, item.linkId]);
}
}
}
}
}
return { m: maxYearInState, d: payload };
}

if (savedObj && Array.isArray(savedObj.d)) {

if (marker === 'o') {

}

var c = appState[semKey][x];
if (!(c.linkId === item.linkId && c.isRetakeCopy && semKey === item.retakeTarget)) newArr.push(c);
}
appState[semKey] = newArr;
}
}
}

if (targetSem === "") {
item.linkId = null; item.retakeTarget = ""; saveState(); renderSemesterMatrix(originSem); calculateCredits(); return;
}

// 🧱 100% 內聯完全焊接，修復所有變數鏈與重修/補修連動統計邏輯
function calculateCredits() {
try {
var passedCommon = 0;
var passedProfReq = 0;
var passedProfEl = 0;
var localPassedOtherEl = 0;
var completelyFailedReq = [];
var currentlyRetakingReq = [];
var successfullyPassedLinkIds = [];

for (var sem in appState) {
if (appState.hasOwnProperty(sem)) {
var arr = appState[sem];
for (var i = 0; i < arr.length; i++) {
var item = arr[i]; if (item.linkId && (item.status === '通過' || item.status === '抵免')) {
if (!hasItem(successfullyPassedLinkIds, item.linkId)) successfullyPassedLinkIds.push(item.linkId);
}
}
}
}

var countedLinks = [];

for (var sem in appState) {
if (appState.hasOwnProperty(sem)) {
var arr = appState[sem];
for (var i = 0; i < arr.length; i++) {
var item = arr[i]; if (item.name === "") continue;
var isGroupPassed = item.linkId && hasItem(successfullyPassedLinkIds, item.linkId);

if (item.status === '通過' || item.status === '抵免') {
if (item.linkId) {
if (!hasItem(countedLinks, item.linkId)) {
if (item.type === 'common') passedCommon += item.cre;
else if (item.type === 'prof-req') passedProfReq += item.cre;
else if (item.type === 'prof') passedProfEl += item.cre;
else if (item.type === 'other') localPassedOtherEl += item.cre;
countedLinks.push(item.linkId);
}
} else {
if (item.type === 'common') passedCommon += item.cre;
else if (item.type === 'prof-req') passedProfReq += item.cre;
else if (item.type === 'prof') passedProfEl += item.cre;
else if (item.type === 'other') localPassedOtherEl += item.cre;
}
} else if (isGroupPassed) {
// Passed chain link
} else if (item.status === '重修中') {
if ((item.type === 'common' || item.type === 'prof-req') && !item.isRetakeCopy) {
if (!hasItem(currentlyRetakingReq, item.name)) currentlyRetakingReq.push(item.name);
}
} else if (item.status === '未通過' || item.status === '未修' || item.status === '轉學補修') {
if ((item.type === 'common' || item.type === 'prof-req') && !item.isRetakeCopy) {
if (!hasItem(completelyFailedReq, item.name)) completelyFailedReq.push(item.name);
}
}
}
}
}

var sumRequiredPassed = passedCommon + passedProfReq;
var sumElectivePassed = passedProfEl + localPassedOtherEl;
var sumTotalPassed = sumRequiredPassed + sumElectivePassed;

document.getElementById('lbl-total-cre').innerHTML = sumTotalPassed + " / 131<span>學分</span>";
var pct = Math.floor((sumTotalPassed / 131) * 100); if (pct > 100) pct = 100;
document.getElementById('lbl-total-pct').innerText = pct + "%";
document.getElementById('fill-total-bar').style.width = pct + "%";

document.getElementById('lbl-req-cre').innerText = sumRequiredPassed + " / 86";
document.getElementById('lbl-p-el-cre').innerText = passedProfEl + " / 30";
document.getElementById('lbl-o-el-cre').innerText = localPassedOtherEl;

var reqDeficit = 86 - sumRequiredPassed;
var lblReq = document.getElementById('lbl-req-stat');
if (lblReq) {
if (reqDeficit > 0) { lblReq.innerText = "還差 " + reqDeficit + " 學分"; lblReq.style.color = 'var(--cls-failed)'; }
else { lblReq.innerText = "已達標"; lblReq.style.color = 'var(--cls-passed)'; }
}

var pElDeficit = 30 - passedProfEl;
var lblPEl = document.getElementById('lbl-p-el-stat');
if (lblPEl) {
if (pElDeficit > 0) { lblPEl.innerText = "還差 " + pElDeficit + " 學分"; lblPEl.style.color = 'var(--cls-failed)'; }
else { lblPEl.innerText = "已達標"; lblPEl.style.color = 'var(--cls-passed)'; }
}

var elDeficit = 45 - sumElectivePassed;
var lblO = document.getElementById('lbl-o-el-stat');
if (lblO) {
if (elDeficit > 0) { lblO.innerText = "還差 " + elDeficit + " 學分"; lblO.style.color = 'var(--cls-failed)'; }
else { lblO.innerText = "已達標"; lblO.style.color = 'var(--cls-passed)'; }
}

var diagContent = document.getElementById('diag-content');
var diagBox = document.getElementById('diag-box');
if (diagContent && diagBox) {
diagContent.innerHTML = "";
if (sumRequiredPassed >= 86 && passedProfEl >= 30 && sumElectivePassed >= 45 && sumTotalPassed >= 131) {
var sOK = createEl('span', null, "🎉 恭喜！您已全部達成畢業規定學分！已具備畢業資格！", diagContent);
sOK.style.color = "var(--cls-passed)"; sOK.style.fontWeight = "bold";
diagBox.style.borderLeftColor = 'var(--cls-passed)';
} else {
diagBox.style.borderLeftColor = 'var(--cls-retake)';
var ul = createEl('ul', null, null, diagContent);

if (86 - sumRequiredPassed > 0) {
var li = createEl('li', null, null, ul);
li.appendChild(document.createTextNode("🚨 必修學分累計仍差 "));
var st1 = createEl('strong', null, (86 - sumRequiredPassed), li);
li.appendChild(document.createTextNode(" 學分。"));
}
if (30 - passedProfEl > 0) {
var li = createEl('li', null, null, ul);
li.appendChild(document.createTextNode("🍊 專業選修尚差 "));
var st2 = createEl('strong', null, (30 - passedProfEl), li);
li.appendChild(document.createTextNode(" 學分 (底線30)。"));
}
if (sumElectivePassed < 45) {
var li = createEl('li', null, null, ul);
li.appendChild(document.createTextNode("🔮 選修總量 (專業選修+其他選修) 還缺 "));
var st3 = createEl('strong', null, (45 - sumElectivePassed), li);
li.appendChild(document.createTextNode(" 學分。"));
}

if (completelyFailedReq.length > 0) {
var liA = createEl('li', null, null, ul);
createEl('div', 'diag-section-title', "❌ 尚未修讀、轉學補修或未通過的必修：", liA);
var sA = createEl('span', null, completelyFailedReq.join('、 '), liA);
sA.style.color = "var(--cls-failed)"; sA.style.fontWeight = "bold";
}
if (currentlyRetakingReq.length > 0) {
var liB = createEl('li', null, null, ul);
createEl('div', 'diag-section-title', "⏳ 正在重修或補修追蹤中的必修：", liB);
var sB = createEl('span', null, currentlyRetakingReq.join('、 '), liB);
sB.style.color = "var(--accent-blue)"; sB.style.fontWeight = "bold";
}
}
}
} catch(err) {
document.getElementById('diag-content').innerText = "運算失敗：" + err.message;
}
}

function startApp() {
checkStorageAvailability(); loadStateSafely();
document.getElementById('global-search').addEventListener('input', doGlobalSearch);
document.getElementById('btn-add-year').addEventListener('click', expandNewYear);
document.getElementById('btn-del-year').addEventListener('click', shrinkLastYear);
document.getElementById('btn-copy-backup').addEventListener('click', copyBackupCode);
document.getElementById('btn-restore-backup').addEventListener('click', importBackupCode);
rebuildTabsUI(); renderStructure(); renderAllBlocks(); calculateCredits();
}

try {
startApp();
} catch (finalError) {
var d = document.getElementById('diag-content');
if (d) d.innerHTML = "<span style='color:red;font-weight:bold;'>語法載入異常：<br>" + finalError.message + "</span>";
}
</script>

</body>
</html>
